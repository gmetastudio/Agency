<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://drive.google.com/uc?export=view&id=1xO-39ko9svKDirMCut6BxCwhv5yys73j" type="image/png">
  <title>GMeta Creative Studio - Solusi Social Media</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
  <style>
    :root {
      --blue-dark: #1e3a8a;
      --blue-main: #3b82f6;
      --blue-light: #06b6d4;
      --gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #06b6d4 100%);
    }
    
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
    
    .navbar { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
    
    .hero-section {
      background: var(--gradient);
      color: white;
      padding: 120px 0 80px;
      clip-path: ellipse(150% 100% at 50% 0%);
    }

    .btn-primary { background: var(--blue-dark); border: none; padding: 12px 30px; border-radius: 50px; }
    .btn-outline-light { border-radius: 50px; }

    .card-price {
      border: none;
      border-radius: 20px;
      transition: transform 0.3s;
      background: #f8fafc;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      height: 100%;
    }
    .card-price:hover { transform: translateY(-10px); border: 2px solid var(--blue-main); }
    .price-tag { color: var(--blue-dark); font-weight: bold; font-size: 1.5rem; }

    .form-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .video-box {
      position: relative;
      width: 100%;
      padding-bottom: 177.77%; 
      height: 0;
      overflow: hidden;
      border-radius: 15px 15px 0 0;
      background: #000;
    }
    .video-box iframe {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    .design-box {
      position: relative;
      width: 100%;
      padding-bottom: 100%; 
      height: 0;
      overflow: hidden;
      border-radius: 15px 15px 0 0;
      background: #f0f0f0;
    }
    .design-box img {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    }
    
    .card-porto {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: 0.3s;
      height: 100%;
    }
    .card-porto:hover { transform: translateY(-10px); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="#">
        <img src="https://drive.google.com/uc?export=view&id=1xO-39ko9svKDirMCut6BxCwhv5yys73j" 
             alt="GMeta Logo" 
             height="40" 
             class="me-2">
        GMeta ID
      </a>
      <div class="ms-auto">
        <a href="#contact" class="btn btn-primary btn-sm">Konsultasi Gratis</a>
      </div>
    </div>
  </nav>

  <section class="hero-section text-center">
    <div class="container" data-aos="fade-up">
      <h1 class="display-4 fw-bold mb-4">GMeta Creative Studio</h1>
      <p class="lead mb-5">Solusi Strategis Social Media untuk Property, B2B, Retail & UMKM</p>
      <div class="d-flex justify-content-center gap-3">
        <a href="#pricelist" class="btn btn-light text-primary fw-bold">Lihat Paket</a>
        <a href="https://wa.me/628112311550" target="_blank" class="btn btn-outline-light">Chat WhatsApp</a>
      </div>
    </div>
  </section>

  <section id="portfolio" class="container py-5">
    <div class="text-center mb-5" data-aos="fade-up">
      <h2 class="fw-bold">Our Creative Portfolio</h2>
      <p class="text-muted">High Impact Videos & Strategic Designs</p>
    </div>
    <div class="row g-4">
        <div class="col-md-4" data-aos="zoom-in">
          <div class="card card-porto text-center">
            <div class="video-box">
              <iframe src="https://www.youtube.com/embed/WUsFh4YppGs?loop=1&playlist=WUsFh4YppGs" allowfullscreen></iframe>
            </div>
            <div class="p-3">
              <span class="badge bg-danger mb-2">Short Video</span>
              <h6 class="fw-bold">Cinematic Property</h6>
            </div>
          </div>
        </div>
        </div>
  </section>

  <section id="contact" class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="form-container">
            <h3 class="fw-bold mb-4 text-center">Mulai Konsultasi Gratis</h3>
            <form id="contactForm">
              <div class="mb-3">
                <label class="form-label fw-bold">Nama Lengkap</label>
                <input type="text" name="nama" class="form-control" placeholder="Masukkan nama Anda" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="untuk pengiriman invoice/proposal" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Nomor WhatsApp</label>
                <input type="tel" name="whatsapp" class="form-control" placeholder="Contoh: 0812xxxx" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Nama Bisnis / Brand</label>
                <input type="text" name="brand" class="form-control" placeholder="Nama brand Anda" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Jenis Bisnis</label>
                <select name="jenis_bisnis" class="form-select" required>
                  <option value="" selected disabled>Pilih Kategori Bisnis</option>
                  <option value="Property">Property</option>
                  <option value="Retail">Retail</option>
                  <option value="B2B">B2B</option>
                  <option value="UMKM">UMKM / Food & Beverage</option>
                  <option value="Other">Lainnya</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Apa goals media sosial Anda?</label>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="goals" value="Meningkatkan Followers" id="goal1">
                  <label class="form-check-label" for="goal1">Meningkatkan Followers</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="goals" value="Meningkatkan Penjualan" id="goal2">
                  <label class="form-check-label" for="goal2">Meningkatkan Penjualan</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="goals" value="Brand Awareness" id="goal3">
                  <label class="form-check-label" for="goal3">Brand Awareness</label>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-3 mt-3">Kirim Data & Chat WhatsApp</button>
            </form>
            <div id="output" class="text-center mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init();
    
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = this;
      const btn = form.querySelector('button');
      const output = document.getElementById('output');
      
      const nama = form.nama.value;
      const whatsapp = form.whatsapp.value;
      const brand = form.brand.value;
      
      // Ambil nilai goals yang dicheck
      const goals = Array.from(form.querySelectorAll('input[name="goals"]:checked')).map(cb => cb.value).join(", ");
      
      btn.innerHTML = "Mengirim...";
      btn.disabled = true;

      const formData = new FormData(form);
      const object = Object.fromEntries(formData);
      // Tambahkan data goals secara manual karena FormData checkbox butuh penyesuaian
      object.goals = goals;
      const json = JSON.stringify(object);

      const makeWebhookUrl = 'https://hook.us2.make.com/4vtgoqnejwgljgac77k90g147l3c2w3f';

      fetch(makeWebhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: json
      })
      .then(response => {
          if (response.ok) {
              output.innerHTML = "<p class='text-success'>Data terkirim! Membuka WhatsApp...</p>";
              
              const phoneNumber = "628112311550";
              const textWA = "Halo GMeta Creative Studio! 👋\n\n" +
                             "Saya baru saja mengisi form konsultasi di website.\n" +
                             "*Nama:* " + nama + "\n" +
                             "*WhatsApp:* " + whatsapp + "\n" +
                             "*Brand:* " + brand + "\n" +
                             "*Goals:* " + goals + "\n\n" +
                             "Mohon info lebih lanjut ya!";
              
              const waUrl = "https://api.whatsapp.com/send?phone=" + phoneNumber + "&text=" + encodeURIComponent(textWA);

              setTimeout(() => {
                window.open(waUrl, '_blank');
              }, 1000);
              
              form.reset();
          } else {
              output.innerHTML = "<p class='text-danger'>Terjadi kesalahan saat mengirim ke server.</p>";
          }
      })
      .catch(error => {
          output.innerHTML = "<p class='text-danger'>Gagal terhubung ke server.</p>";
      })
      .finally(() => {
          btn.innerHTML = "Kirim Data & Chat WhatsApp";
          btn.disabled = false;
      });
    });
  </script>
</body>
</html>
